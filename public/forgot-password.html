<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot password — Spreadsheet Tax</title>
  <link rel="stylesheet" href="/css/site.css" />
</head>
<body class="app-body">
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="logo" href="/"><span class="logo-mark">ST</span> Spreadsheet Tax</a>
      <nav><a href="/signin">Sign in</a></nav>
    </div>
  </header>
  <main class="wrap app-main" style="max-width:480px">
    <h1>Forgot password</h1>
    <p class="muted">If an account exists for that email, we will send a reset link when email delivery is available. For security we always show the same confirmation message.</p>
    <form id="form" class="panel">
      <div class="form-row">
        <label>Email <input type="email" id="email" required autocomplete="username" /></label>
      </div>
      <button type="submit" class="btn btn-primary">Send reset link</button>
      <p id="msg" class="success-box" hidden></p>
      <p id="err" class="error" hidden></p>
    </form>
  </main>
  <script>
    document.getElementById('form').onsubmit = async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const err = document.getElementById('err');
      msg.hidden = true;
      err.hidden = true;
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value }),
      });
      const data = await res.json();
      if (!res.ok) {
        err.textContent = data.error || 'Request failed';
        err.hidden = false;
        return;
      }
      msg.textContent = data.message || 'If the account exists, a link was sent.';
      msg.hidden = false;
    };
  </script>
</body>
</html>
