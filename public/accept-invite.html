<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accept practice invite — Spreadsheet Tax</title>
  <link rel="stylesheet" href="/css/site.css" />
</head>
<body class="theme-light app-body app-simple">
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="logo" href="/"><span class="logo-mark">ST</span> Spreadsheet Tax</a>
      <nav><a href="/signin">Sign in</a></nav>
    </div>
  </header>
  <main class="wrap app-main" style="max-width:520px">
    <h1>Practice invitation</h1>
    <p id="state" class="muted">Checking invite…</p>
    <p id="err" class="error" hidden></p>
    <div id="ok-panel" class="panel" hidden>
      <p id="ok-detail"></p>
      <a class="btn btn-primary" href="/signin?next=/workspace">Sign in to workspace</a>
      <a class="btn btn-ghost" href="/register">Create account with invite email</a>
    </div>
    <div id="no-token" class="panel" hidden>
      <strong>No invite token in this link.</strong>
      <p class="muted">Ask your practice administrator to send a new invite from the signed-in workspace.</p>
      <a class="btn btn-primary" href="/">Home</a>
    </div>
  </main>
  <script>
    const token = new URLSearchParams(location.search).get('token') || '';
    const state = document.getElementById('state');
    if (!token) {
      state.hidden = true;
      document.getElementById('no-token').hidden = false;
    } else {
      // Accept requires matching signed-in email; show token present + next steps
      state.textContent = 'Invite link detected. Sign in with the invited email, then open workspace to complete membership if not already accepted.';
      document.getElementById('ok-panel').hidden = false;
      document.getElementById('ok-detail').textContent =
        'Token present. If you are already signed in as the invitee, open Accept from the email again after sign-in or contact your admin.';
      // Try accept if session exists
      fetch('/api/me/firm-invites/accept', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
      })
        .then(async (r) => {
          const j = await r.json().catch(() => ({}));
          if (r.ok) {
            document.getElementById('ok-detail').textContent =
              j.message || 'Invite accepted. Open the practice workspace.';
            state.textContent = 'Invite accepted.';
          } else if (r.status === 401) {
            state.textContent = 'Sign in with the invited email to accept this invite.';
          } else {
            document.getElementById('err').textContent = j.error || 'Could not accept invite';
            document.getElementById('err').hidden = false;
          }
        })
        .catch(() => {});
    }
  </script>
</body>
</html>
