<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create account — Spreadsheet Tax</title>
  <link rel="stylesheet" href="/css/site.css" />
</head>
<body class="theme-light app-body app-simple">
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="logo" href="/home"><span class="logo-mark">ST</span> Spreadsheet Tax</a>
      <nav>
        <a href="/signin?next=/home">Sign in</a>
        <a href="/leave-to-sales?next=/sales&amp;back=/register">Marketing site</a>
      </nav>
    </div>
  </header>
  <main class="wrap app-main" style="max-width:480px">
    <h1>Create account</h1>
    <p class="muted">Creates an app account (tax home, records, quarterly updates) — not just a website visit.</p>
    <form id="reg-form" class="panel">
      <div class="form-row">
        <label>Name <input type="text" id="name" autocomplete="name" /></label>
      </div>
      <div class="form-row">
        <label>Email <input type="email" id="email" required autocomplete="username" /></label>
      </div>
      <div class="form-row">
        <label>Password (min 8) <input type="password" id="password" required minlength="8" autocomplete="new-password" /></label>
      </div>
      <button type="submit" class="btn btn-primary">Create account</button>
      <p id="err" class="error" hidden></p>
    </form>
  </main>
  <script>
    document.getElementById('reg-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('err');
      err.hidden = true;
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        err.textContent = data.error || 'Could not register';
        err.hidden = false;
        return;
      }
      location.href = '/onboarding';
    });
  </script>
</body>
</html>
