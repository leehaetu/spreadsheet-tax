<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Practice workspace — Spreadsheet Tax</title>
  <link rel="stylesheet" href="/css/site.css" />
</head>
<body class="app-body">
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="logo" href="/"><span class="logo-mark">ST</span> Spreadsheet Tax</a>
      <nav>
        <span class="badge" id="user-badge">Checking session…</span>
        <a href="/app">Personal app</a>
        <a href="/accountant">Demo portfolio</a>
        <button type="button" class="btn btn-ghost btn-sm" id="logout-btn">Sign out</button>
      </nav>
    </div>
  </header>
  <main class="wrap app-main">
    <div class="app-hero">
      <h1>Practice workspace</h1>
      <p class="lead">Authenticated client book for your firm. Demo login seeds a practice with sample clients.</p>
    </div>
    <p id="gate" class="error" hidden></p>
    <section class="panel" id="ws-panel" hidden>
      <div class="form-row">
        <label>Firm
          <select id="firm-select"></select>
        </label>
        <div style="display:flex;align-items:flex-end;gap:0.5rem;flex-wrap:wrap">
          <button type="button" class="btn btn-primary" id="add-client-btn">Add client</button>
          <button type="button" class="btn btn-ghost" id="export-clients-btn">Export CSV</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Client</th><th>Status</th><th>Due</th><th>Actions</th></tr>
          </thead>
          <tbody id="client-body"></tbody>
        </table>
      </div>
    </section>
    <section class="panel" id="import-panel" hidden>
      <h2>Import spreadsheet for client</h2>
      <p class="muted" id="import-client-label">Select a client, then choose a CSV/Excel file.</p>
      <form id="client-import-form" class="upload-form">
        <input type="hidden" id="import-client-id" />
        <label class="file-drop" for="client-file">
          <input type="file" id="client-file" accept=".csv,.xlsx,.xls" required />
          <span>Choose client period file…</span>
        </label>
        <button type="submit" class="btn btn-primary">Import for client</button>
      </form>
      <p id="import-msg" class="muted" hidden></p>
      <p id="import-err" class="error" hidden></p>
    </section>
  </main>
  <script src="/js/workspace.js"></script>
</body>
</html>
