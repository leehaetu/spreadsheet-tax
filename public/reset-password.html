<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password — Spreadsheet Tax</title>
  <link rel="stylesheet" href="/css/site.css" />
</head>
<body class="app-body">
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="logo" href="/"><span class="logo-mark">ST</span> Spreadsheet Tax</a>
      <nav><a href="/signin">Sign in</a></nav>
    </div>
  </header>
  <main class="wrap app-main" style="max-width:480px">
    <h1>Choose a new password</h1>
    <form id="form" class="panel">
      <input type="hidden" id="token" />
      <div class="form-row">
        <label>New password (min 8)
          <input type="password" id="password" required minlength="8" autocomplete="new-password" />
        </label>
      </div>
      <button type="submit" class="btn btn-primary">Update password</button>
      <p id="msg" class="success-box" hidden></p>
      <p id="err" class="error" hidden></p>
    </form>
  </main>
  <script>
    document.getElementById('token').value =
      new URLSearchParams(location.search).get('token') || '';
    document.getElementById('form').onsubmit = async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const err = document.getElementById('err');
      msg.hidden = true;
      err.hidden = true;
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: document.getElementById('token').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        err.textContent = data.error || 'Reset failed';
        err.hidden = false;
        return;
      }
      msg.innerHTML = (data.message || 'Password updated.') + ' <a href="/signin">Sign in</a>';
      msg.hidden = false;
    };
  </script>
</body>
</html>
