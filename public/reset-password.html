<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password — Spreadsheet Tax</title>
  <link rel="stylesheet" href="/css/site.css" />
</head>
<body class="theme-light app-body app-simple">
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="logo" href="/"><span class="logo-mark">ST</span> Spreadsheet Tax</a>
      <nav><a href="/signin">Sign in</a></nav>
    </div>
  </header>
  <main class="wrap app-main" style="max-width:480px">
    <h1>Choose a new password</h1>
    <p id="state" class="muted">Checking reset link…</p>
    <p id="err" class="error" hidden></p>
    <form id="form" class="panel" hidden>
      <div class="form-row">
        <label>New password (min 8)
          <input type="password" id="password" required minlength="8" autocomplete="new-password" />
        </label>
      </div>
      <button type="submit" class="btn btn-primary">Update password</button>
      <p id="msg" class="success-box" hidden></p>
    </form>
    <p id="no-token" class="panel" hidden>
      <strong>This page needs a valid reset link.</strong>
      Open the link from your email, or request a new one.
      <br /><a class="btn btn-primary" href="/forgot-password" style="margin-top:1rem">Request reset link</a>
    </p>
  </main>
  <script>
    const token = new URLSearchParams(location.search).get('token') || '';
    const form = document.getElementById('form');
    const state = document.getElementById('state');
    const noToken = document.getElementById('no-token');
    if (!token || token.length < 16) {
      state.hidden = true;
      noToken.hidden = false;
    } else {
      state.textContent = 'Enter a new password for this account.';
      form.hidden = false;
    }
    form?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('err');
      const msg = document.getElementById('msg');
      err.hidden = true;
      msg.hidden = true;
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token,
          newPassword: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        err.textContent = data.error || 'Reset failed — link may be expired.';
        err.hidden = false;
        return;
      }
      msg.textContent = 'Password updated. You can sign in.';
      msg.hidden = false;
      form.hidden = true;
      state.innerHTML = '<a href="/signin">Sign in</a>';
    });
  </script>
</body>
</html>
