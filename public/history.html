<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>History — Spreadsheet Tax</title>
  <link rel="stylesheet" href="/css/site.css" />
</head>
<body class="app-body">
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="logo" href="/"><span class="logo-mark">ST</span> Spreadsheet Tax</a>
      <nav>
        <a href="/app">App</a>
        <a href="/account">Account</a>
      </nav>
    </div>
  </header>
  <main class="wrap app-main">
    <h1>Your drafts &amp; submissions</h1>
    <p class="muted">Signed-in history only. Free-check drafts without an account are temporary.</p>
    <p id="gate" class="error" hidden></p>
    <section class="panel">
      <h2>Drafts</h2>
      <p id="drafts-empty" class="empty-state" hidden><strong>No drafts yet</strong>Import a spreadsheet from the app.</p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>File</th><th>State</th><th>When</th><th></th></tr></thead>
          <tbody id="drafts"></tbody>
        </table>
      </div>
    </section>
    <section class="panel">
      <h2>Submissions</h2>
      <p id="subs-empty" class="empty-state" hidden><strong>No submissions yet</strong>Complete a quarterly update after review.</p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Attempt</th><th>Mode</th><th>OK</th><th>When</th><th></th></tr></thead>
          <tbody id="subs"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script>
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
    }
    async function load() {
      const me = await fetch('/api/auth/me').then((r) => r.json());
      if (!me.user) {
        document.getElementById('gate').hidden = false;
        document.getElementById('gate').innerHTML = '<a href="/signin?next=/history">Sign in</a> to view history.';
        return;
      }
      const drafts = await fetch('/api/drafts').then((r) => r.json());
      const dbody = document.getElementById('drafts');
      dbody.innerHTML = '';
      const dlist = drafts.drafts || [];
      document.getElementById('drafts-empty').hidden = dlist.length > 0;
      for (const d of dlist) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${esc(d.filename)}</td><td>${esc(d.state)}</td><td>${esc(d.createdAt)}</td>
          <td>
            <a class="btn btn-primary btn-sm" href="/app?draftId=${esc(d.id)}">Open</a>
            <button type="button" class="btn btn-ghost btn-sm ren-draft" data-id="${esc(d.id)}" data-name="${esc(d.filename)}">Rename</button>
            <button type="button" class="btn btn-ghost btn-sm del-draft" data-id="${esc(d.id)}">Delete</button>
          </td>`;
        dbody.appendChild(tr);
      }
      dbody.querySelectorAll('.ren-draft').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          const current = btn.getAttribute('data-name') || '';
          const filename = window.prompt('Draft name', current);
          if (!filename) return;
          const res = await fetch(`/api/drafts/${encodeURIComponent(id)}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename }),
          });
          if (!res.ok) {
            const data = await res.json();
            alert(data.error || 'Rename failed');
            return;
          }
          load();
        });
      });
      dbody.querySelectorAll('.del-draft').forEach((btn) => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this draft?')) return;
          const id = btn.getAttribute('data-id');
          const res = await fetch(`/api/drafts/${encodeURIComponent(id)}`, {
            method: 'DELETE',
          });
          if (!res.ok) {
            const data = await res.json();
            alert(data.error || 'Delete failed');
            return;
          }
          load();
        });
      });
      const subs = await fetch('/api/me/submissions').then((r) => r.json());
      const sbody = document.getElementById('subs');
      sbody.innerHTML = '';
      const slist = subs.submissions || [];
      document.getElementById('subs-empty').hidden = slist.length > 0;
      for (const s of slist) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><code>${esc(s.id.slice(0, 8))}…</code></td><td>${esc(s.mode)}</td>
          <td>${s.ok ? 'Yes' : 'No'}</td><td>${esc(s.createdAt)}</td>
          <td><a class="btn btn-ghost btn-sm" href="/api/receipts/${esc(s.id)}">Receipt JSON</a></td>`;
        sbody.appendChild(tr);
      }
    }
    load();
  </script>
</body>
</html>
